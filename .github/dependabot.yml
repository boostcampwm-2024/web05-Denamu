version: 2

updates:
  # ──────────────────────────────────────────
  # GitHub Actions
  # ──────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    labels:
      - '🤖 Dependency'

  # ──────────────────────────────────────────
  # npm — root (commitizen, lefthook, artillery)
  # ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - '🤖 Dependency'
    groups:
      dev-dependencies:
        dependency-type: 'development'

  # ──────────────────────────────────────────
  # npm — server (NestJS)
  # ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/server'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - '🤖 Dependency'
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      typeorm:
        patterns:
          - 'typeorm'
          - '@nestjs/typeorm'
      dev-dependencies:
        dependency-type: 'development'

  # ──────────────────────────────────────────
  # npm — client (React + Vite)
  # ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/client'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - '🤖 Dependency'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-*'
          - '@types/react*'
          - 'eslint-plugin-react*'
          - '@vitejs/plugin-react-swc'
      radix-ui:
        patterns:
          - '@radix-ui/*'
      tanstack:
        patterns:
          - '@tanstack/*'
      dev-dependencies:
        dependency-type: 'development'

  # ──────────────────────────────────────────
  # npm — feed-crawler
  # ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/feed-crawler'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - '🤖 Dependency'
    groups:
      dev-dependencies:
        dependency-type: 'development'

  # ──────────────────────────────────────────
  # npm — email-worker
  # ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/email-worker'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - '🤖 Dependency'
    groups:
      dev-dependencies:
        dependency-type: 'development'
